services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fireburst_people
    ports:
      # Para `npm run db:setup -w server` desde el host (opcional)
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fireburst_people
      JWT_SECRET: ${JWT_SECRET:-dev-cambiar-en-produccion-minimo-32-caracteres}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
      PORT: "4000"
      NEW_PEOPLE_DAYS: ${NEW_PEOPLE_DAYS:-30}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate --url http://web:80
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  pgdata:
